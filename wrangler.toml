# Cloudflare Worker config for the Divinci SDK landing-page template.
#
# Per-customer setup (see README.md):
#   1. Set `name` to your worker, e.g. "<customer>-landing".
#   2. Create the KV namespace in YOUR account and paste its id below:
#        wrangler kv namespace create EMAIL_QUOTA
#   3. Set the vars to match src/brand.config.ts → divinci.{apiBase,releaseId}.
#   4. Set secrets:  wrangler secret put LANDING_PAGE_HMAC_KEY
#      (must match the Divinci Release's landing-page HMAC). Optional:
#      RESEND_API_KEY, VERIFY_TOKEN_SECRET, BASIC_AUTH_PASSWORD, ADMIN_RESET_TOKEN.
name = "REPLACE-landing"
main = "./src/worker.ts"
compatibility_date = "2026-05-28"
compatibility_flags = ["nodejs_compat"]

# Pin the local `wrangler dev` port to match the vite /api proxy in
# astro.config.mjs (:8787).
[dev]
port = 8787

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

# KV ids are Cloudflare-account-scoped — create your own (step 2 above) and
# paste the id here.
[[kv_namespaces]]
binding = "EMAIL_QUOTA"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

[[durable_objects.bindings]]
name = "QUOTA_DO"
class_name = "EmailQuotaCoordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["EmailQuotaCoordinator"]

# Keep in sync with src/brand.config.ts → divinci. Default is the Divinci
# PRODUCTION API; point at api.stage.divinci.app only for staging demos.
[vars]
DIVINCI_API_BASE = "https://api.divinci.app"
DIVINCI_RELEASE_ID = "REPLACE_WITH_RELEASE_ID"

# Optional: add a [env.staging] block (own name + KV id + staging API) if you
# run a separate staging worker. See the Divinci SDK docs for the full pattern.
